{% load static %}
<!DOCTYPE html>
<html lang="en">

<head class="body1">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aventra | Explore. Experience. Travel.</title>
    <link rel="icon" type="image/png" href="{% static 'images/favicon.png' %}">
    <!-- <link rel="stylesheet" href="{% static 'css/style.css' %}"> -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}?v=3">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <header class="premium-header">

        <!-- LEFT -->
        <div class="header-left">
            <a href="/" class="brand">
                <img src="{% static 'images/favicon.png' %}" alt="Aventra Logo">
                <span>AVENTRA</span>
            </a>
        </div>

        <!-- CENTER SEARCH -->
        <div class="search-container">
            <input type="text" placeholder="Search destinations, tours, experiences">
            <button class="search-btn">
                <i class="fa fa-search"></i>
            </button>
        </div>

        <!-- RIGHT -->
        <div class="header-right">

            <div class="helpline">
                <i class="fa-solid fa-phone-volume fa-lg"></i>
                <div class="helpline-text">
                    <small>Call Us</small>
                    <span>+91 12345 67890</span>
                </div>
            </div>

            <a href="#" class="agent-link">Travel Agent? Join Us</a>

            <div class="auth-links">
                <a href="/login" class="login-link">Log in</a>
                <a href="/register" class="signup-btn">Sign Up</a>
            </div>

        </div>

    </header>

    <section class="hero-section">
        <div class="hero-center-text">
            <h1>Explore The World With Aventra</h1>
            <p>Your journey begins here.</p>
        </div>

        <div class="hero-reviews">
            {% for review in reviews %}
            <div class="review-card">
                <div class="review-stars">★★★★★</div>
                <p class="review-text">"{{ review.comment }}"</p>
                <span class="review-user">- {{ review.user}}</span>
            </div>
            {% endfor %}
        </div>
    </section>

            <p>{{ package.description|truncatewords:15 }}</p>
        </div>
    </a>
    {% endfor %}
-->

</body>

</html>
